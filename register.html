<!DOCTYPE html>
<html>
<head>
    <title>MVN Event Registration</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        .header {
            text-align: center;
            padding: 20px;
            background-color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .banner {
            width: 100%;
            height: 220px;
            background-image: url('event.jpg');
            background-size: cover;
            background-position: center;
        }

        .container {
            width: 360px;
            margin: 30px auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            background: #2c2c2c;
            color: white;
        }

        input::placeholder {
            color: #bbbbbb;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #03a9f4;
            border: none;
            color: white;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0288d1;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="header">
    MVN EVENT REGISTRATION
</div>

<div class="banner"></div>

<div class="container">
    <h2>Register for Activity</h2>
    <form action="register.php" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone Number" required>

        <select name="event" required>
            <option value="">Select Activity</option>
            <option value="Gaming Tournament">Gaming Tournament</option>
            <option value="Coding Contest">Coding Contest</option>
            <option value="College Fest">College Fest</option>
            <option value="Workshop">Workshop</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>

<div class="footer">
    © 2026 MVN Events
</div>

</body>
</html>
